<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syntropic Minds | Math & Physics Mentoring</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- GLOBAL CSS --- */
        :root {
            --bg-light: #F8FAFC; 
            --text-dark: #1E293B; 
            --text-muted: #64748B;
            --turquoise: #14B8A6; 
            --blue-deep: #2563EB; 
            --gold: #F59E0B; 
            --orange-soft: #FB923C;
            --card-bg: #FFFFFF;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.7;
        }

        h1, h2, h3, .logo {
            font-family: 'Lora', serif;
            font-weight: 500;
            color: var(--blue-deep);
        }

        /* --- NAVIGATION --- */
        header {
            background-color: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1.5rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #E2E8F0;
        }

        .logo {
            font-size: 1.8rem;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--turquoise);
            font-style: italic;
        }

        nav a {
            color: var(--text-dark);
            text-decoration: none;
            margin-left: 2.5rem;
            font-weight: 400;
            font-size: 1.05rem;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--gold);
        }

        /* --- BUTTONS --- */
        .btn-primary, .btn-secondary {
            display: inline-block;
            padding: 1rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-family: 'Outfit', sans-serif;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
            font-size: 1.05rem;
            text-align: center;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold), var(--orange-soft));
            color: white;
            box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4);
        }

        .btn-secondary {
            background: transparent;
            color: var(--blue-deep);
            border: 2px solid var(--blue-deep);
            margin-left: 1rem;
        }

        .btn-secondary:hover {
            background: var(--blue-deep);
            color: white;
        }

        /* --- SECTION SPACING --- */
        section {
            padding: 6rem 5%;
            max-width: 1200px;
            margin: 0 auto;
        }

        .text-center { text-align: center; }

        /* --- HERO --- */
        .hero {
            text-align: center;
            padding: 8rem 5%;
            background: radial-gradient(circle at top right, rgba(20, 184, 166, 0.1), transparent 40%),
                        radial-gradient(circle at bottom left, rgba(59, 130, 246, 0.05), transparent 40%);
        }

        .hero h1 {
            font-size: 4rem;
            line-height: 1.1;
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }

        .hero h1 span {
            color: var(--blue-deep);
            font-style: italic;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 700px;
            margin: 0 auto 3rem;
        }

        /* --- GRIDS --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2.5rem;
            margin-top: 3rem;
        }

        .card {
            background: var(--card-bg);
            padding: 3rem 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            border-top: 4px solid var(--turquoise);
            transition: transform 0.3s;
        }
        
        .card:hover { transform: translateY(-5px); }

        .card h3 {
            font-size: 1.6rem;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        /* --- TUTOR BIO SECTION --- */
        .bio-content {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .bio-title {
            color: var(--gold);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            display: block;
        }

        /* --- PRICING --- */
        .pricing-grid {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 3rem;
        }

        .price-card {
            background: white;
            padding: 3rem;
            border-radius: 16px;
            text-align: center;
            min-width: 280px;
            border-top: 4px solid var(--gold);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        .price-value {
            font-size: 3rem;
            font-family: 'Lora', serif;
            color: var(--blue-deep);
            margin: 1rem 0;
        }

        /* --- CONTACT & SOCIALS --- */
        .social-links {
            margin-top: 2rem;
        }
        .social-links a {
            display: inline-block;
            margin: 0 1rem;
            color: var(--blue-deep);
            text-decoration: none;
            font-weight: 500;
        }

        /* --- FOOTER --- */
        footer {
            background-color: white;
            padding: 4rem 5%;
            border-top: 1px solid #E2E8F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
        }

        /* --- MODAL --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(5px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal-content {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            width: 95%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            text-align: center;
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 1rem; right: 1rem;
            font-size: 2rem;
            cursor: pointer;
            color: var(--text-muted);
            border: none;
            background: none;
            z-index: 10;
        }
    </style>
</head>
<body>

        <a href="#home" class="logo">Syntropic<span>Minds</span></a>
        <nav>
            <a href="#home">Home</a>
            <a href="#about">About</a>
            <a href="#curriculum">Curriculum</a>
            <a href="#pricing">Pricing</a>
            <a href="#contact
